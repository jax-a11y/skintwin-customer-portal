name: E2E Nightly

on:
  schedule:
    # Run every day at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      browsers:
        description: "Browsers to test (comma-separated: chromium,firefox,webkit)"
        default: "chromium,firefox,webkit"
        required: false
      shards:
        description: "Number of shards per browser"
        default: "4"
        required: false

concurrency:
  group: e2e-nightly
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.4.1"

jobs:
  setup:
    name: Setup Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          BROWSERS="${{ github.event.inputs.browsers || 'chromium,firefox,webkit' }}"
          SHARDS="${{ github.event.inputs.shards || '4' }}"
          
          # Build matrix JSON
          MATRIX='{"include":['
          FIRST=true
          for browser in $(echo "$BROWSERS" | tr ',' ' '); do
            for shard in $(seq 1 $SHARDS); do
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                MATRIX="$MATRIX,"
              fi
              MATRIX="$MATRIX{\"browser\":\"$browser\",\"shard\":$shard,\"total\":$SHARDS}"
            done
          done
          MATRIX="$MATRIX]}"
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Type check
        run: corepack pnpm run check

      - name: Run unit tests
        run: corepack pnpm run test

      - name: Build
        run: corepack pnpm run build
        env:
          # Vite envs are baked into the client bundle at build time (the
          # values set on the e2e run steps are too late). Without
          # VITE_OAUTH_PORTAL_URL the client crashes at render with
          # "TypeError: Failed to construct 'URL'" in getLoginUrl().
          VITE_APP_ID: "test-app-id"
          VITE_OAUTH_PORTAL_URL: "http://localhost:3000"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 1

  e2e-nightly:
    name: E2E ${{ matrix.browser }} (${{ matrix.shard }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    needs: [setup, build]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: corepack pnpm exec playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: corepack pnpm exec playwright install-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: build-output
          path: dist/

      - name: Run E2E tests
        run: corepack pnpm run e2e --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/${{ matrix.total }}
        env:
          CI: true
          E2E_TEST_MODE: "true"
          JWT_SECRET: "test-secret-for-ci-e2e-testing-only"
          VITE_APP_ID: "test-app-id"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

  e2e-report:
    name: Merge Reports
    runs-on: ubuntu-latest
    needs: e2e-nightly
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Download all test results
        uses: actions/download-artifact@v4.1.8
        with:
          pattern: test-results-*
          path: all-test-results/
          merge-multiple: true

      - name: Merge reports
        run: corepack pnpm exec playwright merge-reports --reporter html ./all-test-results

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 30

      - name: Generate summary
        run: |
          echo "## 🌙 Nightly E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Browsers: ${{ github.event.inputs.browsers || 'chromium,firefox,webkit' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Shards: ${{ github.event.inputs.shards || '4' }} per browser" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Download the merged Playwright report from artifacts for detailed results." >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [e2e-nightly, e2e-report]
    if: failure()
    steps:
      - name: Create failure summary
        run: |
          echo "## ❌ Nightly E2E Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The nightly E2E test run has failed. Please check the test results and Playwright reports." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run URL:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
