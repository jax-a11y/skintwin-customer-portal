name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.4.1"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Type check
        run: corepack pnpm run check

      - name: Run unit tests
        run: corepack pnpm run test

      - name: Build
        run: corepack pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: corepack pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: corepack pnpm exec playwright install-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: build-output
          path: dist/

      - name: Run E2E smoke tests
        run: corepack pnpm run e2e --project=chromium --grep "@smoke"
        env:
          CI: true
          E2E_TEST_MODE: "true"
          JWT_SECRET: "test-secret-for-ci-e2e-testing-only"
          VITE_APP_ID: "test-app-id"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-smoke
          path: test-results/
          retention-days: 7

  e2e-full:
    name: E2E Full Tests
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: corepack pnpm exec playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: corepack pnpm exec playwright install-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: build-output
          path: dist/

      - name: Run E2E full tests
        run: corepack pnpm run e2e --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/2
        env:
          CI: true
          E2E_TEST_MODE: "true"
          JWT_SECRET: "test-secret-for-ci-e2e-testing-only"
          VITE_APP_ID: "test-app-id"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  e2e-report:
    name: Merge E2E Reports
    runs-on: ubuntu-latest
    needs: e2e-full
    if: always() && needs.e2e-full.result != 'skipped'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Download all test results
        uses: actions/download-artifact@v4.1.8
        with:
          pattern: test-results-*
          path: all-test-results/
          merge-multiple: true

      - name: Merge reports
        run: corepack pnpm exec playwright merge-reports --reporter html ./all-test-results

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30

      - name: Job summary
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the merged Playwright report from the artifacts to view detailed results." >> $GITHUB_STEP_SUMMARY
